  #     sh -c "pip install poetry &&
  #            poetry install --no-root &&
  #            poetry run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
  #   depends_on:
  #     - postgres
  #   stdin_open: true
  #   tty: true

  # streamlit:
  #   image: python:3.12
  #   container_name: dio_streamlit
  #   working_dir: /app
  #   volumes:
  #     - ./streamlit:/app
  #   command: >
  #     sh -c "pip install streamlit requests python-dotenv &&
  #            streamlit run main.py --server.port 8501 --server.address 0.0.0.0"
  #   ports:
  #     - "8501:8501"
  #   depends_on:
  #     - fastapi
  streamlit:
    build:
      context: ./streamlit
      dockerfile: Dockerfile
    container_name: dio_streamlit
    restart: always
    volumes:
      - ./streamlit:/app
    ports:
      - "8501:8501"
    depends_on:
      - fastapi
    networks:
      - dio-bank-network

volumes:
  postgres_data:
  ollama_data:

networks:
  dio-bank-network:
    driver: bridge
