version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: dio_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dio-bank-network
    
  ollama:
    build: ./ollama
    container_name: dio_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dio-bank-network

  fastapi:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: dio_fastapi
    env_file:
      - .env
    volumes:
      - ./api:/api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    networks:
      - dio-bank-network
